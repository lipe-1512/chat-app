<!doctype html>
<html lang="PT-BR">
  <head>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Montserrat:ital,wght@0,700;0,800;1,700&display=swap" rel="stylesheet">
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>client</title>
  </head>
<body>
    <h1>Chat App</h1>
    
    <div id="login-area">
        <label>Qual o seu usuário?</label>
        <input type="text" id="nomeUsuario" placeholder="Ex: joao" />
        <button onclick="conectar()">Entrar no Chat</button>
    </div>

    <div id="chat-area" style="display: none; margin-top: 20px;">
        <input type="text" id="mensagemBox" placeholder="Digite uma mensagem..."/>
        <button onclick="enviarMensagem()">Enviar</button>
        <ul id="historico"></ul>
    </div>

    <script>
        var ws = null; // Começa sem conexão

        function conectar() {
            var usuario = document.getElementById("nomeUsuario").value;
            
            if (usuario === "") {
                alert("Por favor, digite um nome de usuário!");
                return;
            }

            // Conecta no FastAPI usando o nome que foi digitado
            ws = new WebSocket("ws://127.0.0.1:8000/ws/" + usuario); // Caso esteja em outro computador altere esta linha

            // O que acontece quando a conexão dá certo
            ws.onopen = function() {
                // Esconde a área de login e mostra o chat
                document.getElementById("login-area").style.display = "none";
                document.getElementById("chat-area").style.display = "block";
            };

            // O que acontece quando recebe uma mensagem dos outros
            ws.onmessage = function(event) {
                var historico = document.getElementById('historico');
                var novaLinha = document.createElement('li');
                // O seu backend já está formatando como "[joao] texto", então é só exibir
                novaLinha.innerHTML = event.data; 
                historico.appendChild(novaLinha);
            };
        }

        function enviarMensagem() {
            var input = document.getElementById("mensagemBox");
            
            // Só envia se a caixa não estiver vazia
            if (input.value !== "") {
                ws.send(input.value); // Envia para o servidor Python
                
                // Adiciona a sua própria mensagem na tela
                var historico = document.getElementById('historico');
                var novaLinha = document.createElement('li');
                novaLinha.innerHTML = "<b>Você:</b> " + input.value;
                historico.appendChild(novaLinha);
                
                input.value = ''; // Limpa a caixa de texto
            }
        }
    </script>
</body>
</html>
